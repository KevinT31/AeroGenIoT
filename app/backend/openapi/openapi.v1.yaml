openapi: 3.0.3
info:
  title: AeroGenIoT API
  version: 1.0.0
  description: API base para AeroGenIoT (monitor de cultivos)
servers:
  - url: /api/v1
x-businessRulesCatalog:
  - id: BR-001
    rule: Un usuario solo puede ver/editar sus propias granjas.
  - id: BR-002
    rule: Un dispositivo solo puede estar asignado a una granja/plot a la vez.
  - id: BR-003
    rule: Una lectura siempre pertenece a un dispositivo registrado.
  - id: BR-004
    rule: Alertas pasan por estados open -> acknowledged -> resolved.
  - id: BR-005
    rule: Umbrales se versionan; cambios crean nueva version.
  - id: BR-006
    rule: Plot hereda umbrales de granja si no tiene propios.
  - id: BR-007
    rule: Solo admin puede cambiar umbrales globales.
  - id: BR-008
    rule: Recomendaciones son solo lectura.
paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      responses:
        "200":
          $ref: "#/components/responses/OkHealth"
        "500":
          $ref: "#/components/responses/ServerError"
  /metrics:
    get:
      tags: [system]
      summary: Metrics endpoint
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/register:
    post:
      tags: [auth]
      summary: Registro con email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          $ref: "#/components/responses/OkAuth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/login:
    post:
      tags: [auth]
      summary: Login con email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/OkAuth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/google:
    post:
      tags: [auth]
      summary: Login con Google (Gmail)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/OkAuth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotacion de refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          $ref: "#/components/responses/OkAuth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/logout:
    post:
      tags: [auth]
      summary: Cierra sesion y revoca refresh token
      security:
        - bearerAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/me:
    get:
      tags: [auth]
      summary: Perfil del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          headers:
            x-request-id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /users/preferences:
    put:
      tags: [users]
      summary: Actualiza preferencias del usuario
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferences"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
  /farms:
    get:
      tags: [farms]
      summary: Lista granjas del usuario
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [farms]
      summary: Crea una granja
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /farms/{farmId}:
    get:
      tags: [farms]
      summary: Obtiene una granja
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FarmId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [farms]
      summary: Actualiza una granja
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FarmId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [farms]
      summary: Elimina una granja
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FarmId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /farms/{farmId}/plots:
    get:
      tags: [plots]
      summary: Lista plots de una granja
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FarmId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plot"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [plots]
      summary: Crea un plot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FarmId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /plots/{plotId}:
    get:
      tags: [plots]
      summary: Obtiene un plot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlotId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [plots]
      summary: Actualiza un plot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [plots]
      summary: Elimina un plot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlotId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /devices:
    get:
      tags: [devices]
      summary: Lista dispositivos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [devices]
      summary: Registra un dispositivo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /devices/{deviceId}:
    get:
      tags: [devices]
      summary: Obtiene un dispositivo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [devices]
      summary: Actualiza un dispositivo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /devices/{deviceId}/assign:
    post:
      tags: [devices]
      summary: Asigna dispositivo a granja/plot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceAssign"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /readings:
    get:
      tags: [readings]
      summary: Lista lecturas
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          schema:
            type: string
        - name: plotId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /readings/latest:
    get:
      tags: [readings]
      summary: Ultima lectura por granja/plot
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          required: true
          schema:
            type: string
        - name: plotId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorReading"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /readings/ingest:
    post:
      tags: [readings]
      summary: Ingesta de lectura desde edge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestPayload"
      responses:
        "202":
          description: Accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
  /recommendations:
    get:
      tags: [recommendations]
      summary: Lista recomendaciones
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          schema:
            type: string
        - name: plotId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /recommendations/latest:
    get:
      tags: [recommendations]
      summary: Ultima recomendacion por granja/plot
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          required: true
          schema:
            type: string
        - name: plotId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /alerts:
    get:
      tags: [alerts]
      summary: Lista alertas
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, acknowledged, resolved]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /alerts/{alertId}/ack:
    post:
      tags: [alerts]
      summary: Marca alerta como acknowledged
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlertId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      x-stateMachine:
        from: open
        to: acknowledged
  /alerts/{alertId}/resolve:
    post:
      tags: [alerts]
      summary: Marca alerta como resolved
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlertId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      x-stateMachine:
        from: [open, acknowledged]
        to: resolved
  /notifications/register:
    post:
      tags: [notifications]
      summary: Registra token push (Expo)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /notifications/test:
    post:
      tags: [notifications]
      summary: Envia notificacion de prueba
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /thresholds:
    get:
      tags: [thresholds]
      summary: Obtiene umbrales por granja/plot
      security:
        - bearerAuth: []
      parameters:
        - name: farmId
          in: query
          required: true
          schema:
            type: string
        - name: plotId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [thresholds]
      summary: Actualiza umbrales
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdProfile"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    RequestId:
      description: Request id
      schema:
        type: string
  parameters:
    FarmId:
      name: farmId
      in: path
      required: true
      schema:
        type: string
    PlotId:
      name: plotId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
  responses:
    OkHealth:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
    OkAuth:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthResponse"
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: Invalid payload
        details:
          type: object
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@AeroGenIoT.app
        password:
          type: string
          format: password
          example: "secret123"
        name:
          type: string
          example: "Juan"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, viewer]
    UserPreferences:
      type: object
      properties:
        unitSystem:
          type: string
          enum: [metric, imperial]
        language:
          type: string
          example: es
        alertChannels:
          type: array
          items:
            type: string
            enum: [inapp, email, sms]
    Farm:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        createdAt:
          type: string
          format: date-time
    FarmCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        location:
          type: string
    FarmUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
    Plot:
      type: object
      properties:
        id:
          type: string
        farmId:
          type: string
        name:
          type: string
        cropType:
          type: string
    PlotCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        cropType:
          type: string
    PlotUpdate:
      type: object
