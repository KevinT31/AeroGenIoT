services:
  postgres:
    image: postgres:16
    container_name: AeroGenIoT-postgres
    environment:
      POSTGRES_USER: aerogeniot
      POSTGRES_PASSWORD: aerogeniot
      POSTGRES_DB: aerogeniot
    ports:
      - "${POSTGRES_PORT:-5544}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: AeroGenIoT-redis
    ports:
      - "${REDIS_PORT:-6381}:6379"

  minio:
    image: minio/minio:latest
    container_name: AeroGenIoT-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio:/data

volumes:
  pgdata:
  minio:

