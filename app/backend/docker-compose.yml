services:
  mysql:
    image: mysql:8.4
    container_name: AuroraNoctua-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aerogeniot
      MYSQL_USER: aerogeniot
      MYSQL_PASSWORD: aerogeniot
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: AeroGenIoT-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio:/data

volumes:
  mysqldata:
  minio:

